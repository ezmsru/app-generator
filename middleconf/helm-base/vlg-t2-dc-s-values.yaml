generic:
  deployTimeout: "3m"

pam:
  provider: "singleconnect"
  url: "https://pam.megafon.ru"
  aapmToken: ""
  secrets:
    - name: {{PROJECT_NAME}}_postgres_db_password
      secretPath: "/MegaFon/Common/Data-Analytics/dev/{{PROJECT_NAME}}/postgres_db_password"
      property: password
    - name: {{PROJECT_NAME}}_postgres_db_username
      secretPath: "/MegaFon/Common/Data-Analytics/dev/{{PROJECT_NAME}}/postgres_db_password"
      property: username
    - name: {{PROJECT_NAME}}_redis_db_password
      secretPath: "/MegaFon/Common/Data-Analytics/dev/{{PROJECT_NAME}}/redis_db_password"
      property: password
    - name: {{PROJECT_NAME}}_redis_db_username
      secretPath: "/MegaFon/Common/Data-Analytics/dev/{{PROJECT_NAME}}/redis_db_password"
      property: username

deployment:
  replicaCount: 1
  container:
    registry: docker-middle-dev-local.unixrepo.megafon.ru
    imagePullPolicy: Always
    env:
      - name: ENV
        value: "DEV"
      - name: APP_NAME
        value: "{{PROJECT_NAME}}"
      - name: APP_ENV
        value: "dev"
      - name: LOG_LEVEL
        value: "debug"

      # Postgres (enabled={{PG_ENABLED}})
      - name: DB_USER
        valueFrom:
          secretKeyRef:
            name: {{PROJECT_NAME}}-secrets-from-pam
            key: {{PROJECT_NAME}}_postgres_db_username
      - name: DB_PASSWORD
        valueFrom:
          secretKeyRef:
            name: {{PROJECT_NAME}}-secrets-from-pam
            key: {{PROJECT_NAME}}_postgres_db_password
      - name: DB_HOST
        value: "{{PG_HOST}}"
      - name: DB_NAME
        value: "{{PG_DB}}"
      - name: DB_PORT
        value: "5432"
      - name: DB_SCHEMA
        value: "public"

      # Redis (enabled={{REDIS_ENABLED}})
      - name: REDIS_HOST
        value: "{{REDIS_HOST}}"
      - name: REDIS_PORT
        value: "6379"
      - name: REDIS_DB
        value: "0"
      - name: REDIS_USERNAME
        valueFrom:
          secretKeyRef:
            name: {{PROJECT_NAME}}-secrets-from-pam
            key: {{PROJECT_NAME}}_redis_db_username
      - name: REDIS_PASSWORD
        valueFrom:
          secretKeyRef:
            name: {{PROJECT_NAME}}-secrets-from-pam
            key: {{PROJECT_NAME}}_redis_db_password

      # ClickHouse (enabled={{CH_ENABLED}})
      - name: CH_HOST
        value: "{{CH_HOST}}"
      - name: CH_DB
        value: "{{CH_DB}}"
      - name: CH_PORT
        value: "8123"
